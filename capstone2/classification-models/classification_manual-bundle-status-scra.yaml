apiVersion: rrsd.zetaapps.in/v1alpha1
kind: ClassificationModel
metadata:
  labels:
    rrsd.zetaapps.in/day: day-minus-one
  name: zee.aether.classification-model.manual-bundle-status-scra

spec:
  associationAttributes: {}
  associationCardinality: Single

  attributes:
    type: manual
    isDerived: 'true'
    sourceEntityType: Account
    sourceStatusModelCode: SCRAStatus
    sourceModelUnitToBundleStatusMap: |
      {
        "LEVEL_1": "ZEE_MBSA1"
      }

  classificationFunction: |
    function classificationUnits(object) {
      if (!object.hasOwnProperty('sourceStatusModelCode') || !object.hasOwnProperty('sourceStatusClassificationUnit')) {
        return {};
      }

      var sourceStatusModelCode = object.sourceStatusModelCode;
      var sourceStatusClassificationUnit = object.sourceStatusClassificationUnit;

      var classificationMap = {
        'SCRAStatus': {
          'LEVEL_1': ['ZEE_MBSA1']
        }
      };

      if (classificationMap[sourceStatusModelCode]) {
        return classificationMap[sourceStatusModelCode][sourceStatusClassificationUnit] || ['UNCLASSIFIED'];
      }

      return ['UNCLASSIFIED'];
    }

  code: manualBundleStatusSCRA
  icon: https://icon.yuko
  infoUri: https://info.com
  isRuleBased: true

  metadata:
    description: Bundle Status SCRA Classification Model.
    id: aether.classification-model.manual-bundle-status-scra
    name: manual-bundle-status-scra
    requester:
      module: aether
      moduleVersion: 0.0.1
    tenantCode: zee
    tenantId: '999999'

  modelType: Collection
  name: Bundle Status SCRA Classification Model
  objectType: in.zeta.aether.bundle
  tenantId: '999999'