kind: AccountHolderProvider
apiVersion: rrsd.zetaapps.in/v1alpha1
metadata:
  name: zee.aries.accountholderprovider.premium.us
  labels:
    rrsd.zetaapps.in/day: day-zero
  namespace: aries
  annotations:
    zeta.tech/resource-tags: '{"gitDbRepo":"tenant_configuration.aws-default-pp-mumbai.lsg","gitDbPath":"https://gitea.internal.mum1-pp.zetaapps.in/zetaengg/tenant_configuration.aws-default-pp-mumbai.lsg.git","filePath":"module_configurations/module_aries/AccountHolderProvider/account-holder-provider_ahpin00001.yaml","tenantCode":"lsg"}'
spec:
  metadata:
    id: aries.accountholderprovider.bz_us_premium_001
    name: Bank Zee US Premium Provider
    description: CLM Provider for US Affluent customers - Bank Zee Black Infinite
    tenantId: '802156'
    tenantCode: zee
  code: BZ_US_AHP_001
  name: Bank Zee US Issuer Provider
  state: ENABLED
  schema:
    description: "US Regulatory Schema for Affluent RAH (Real Account Holder)"
    attributes: '{}'
    content: |
      {
        "type": "object",
        "title": "Bank Zee US Affluent Schema",
        "required": ["firstName", "lastName", "dob", "vectors", "pointsOfPresence", "status"],
        "properties": {
          "firstName": { "type": "string", "pattern": "^[a-zA-Z- ]*$", "maxLength": 25 },
          "lastName": { "type": "string", "pattern": "^[a-zA-Z- ]*$", "maxLength": 25 },
          "dob": { 
            "type": "string", 
            "format": "date", 
            "description": "Required for age verification per US Card Act "
          },
          "status": { "enum": ["ENABLED", "DISABLED", "BLOCKED"] },
          
          # A. VECTORS: Mandatory US Tax Identity 
          "vectors": {
            "type": "array",
            "minItems": 1,
            "items": {
              "type": "object",
              "required": ["type", "value", "status"],
              "properties": {
                "type": { "const": "SSN" },
                "value": { 
                  "type": "string", 
                  "pattern": "^\\d{9}$", 
                  "description": "Must be exactly 9 digits for US SSN " 
                },
                "status": { "const": "ENABLED" }
              }
            }
          },

          # B. KYC DETAILS: Verification Status 
          "KYCStatus": {
            "type": "object",
            "required": ["kycStatus"],
            "properties": {
              "kycStatus": { "enum": ["Full_KYC", "Min_KYC", "No_KYC"] }
            }
          },

          # C. POINTS OF PRESENCE: US Postal Standards 
          "pointsOfPresence": {
            "type": "array",
            "contains": { "properties": { "label": { "const": "Billing" } } },
            "items": {
              "type": "object",
              "required": ["label", "addresses"],
              "properties": {
                "label": { "enum": ["Billing", "Permanent", "Work", "Mobile", "Communication"] },
                "addresses": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "required": ["type", "value"],
                    "properties": {
                      "type": { "enum": ["Postal", "Phone", "Email"] },
                      "value": {
                        "properties": {
                          "state": { 
                            "pattern": "(?i)^(AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY|DC)$",
                            [cite_start]"description": "Standard 2-letter US State codes "
                          },
                          "country": { "const": "US" },
                          "postCode": { "type": "string", "pattern": "^[0-9]{5}([0-9]{4})?$" }
                        }
                      }
                    }
                  }
                }
              }
            }
          },

          # D. FINANCIAL DETAILS: For Affluent Tiering
          "financialDetails": {
            "type": "object",
            "properties": {
              "incomeDetailsList": {
                "type": "array",
                "items": {
                  "properties": {
                    "currency": { "const": "USD" },
                    "value": { "type": "integer", "minimum": 100000 }
                  }
                }
              }
            }
          },

          # E. TAGS: Premium status tracking [cite: 37, 50, 58]
          "tags": {
            "type": "array",
            "items": {
              "properties": {
                "type": { "enum": ["VIP", "SCRA", "BANKRUPTCY", "OFFICER_INSIDER"] },
                "value": { "type": "string" }
              }
            }
          }
        }
      }