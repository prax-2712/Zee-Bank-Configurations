kind: Configuration
apiVersion: rrsd.zetaapps.in/v1alpha1
metadata:
  name: zee.aries.configuration.module.premium.ah-schema
  labels: {}
  annotations:
    zeta.tech/resource-tags: '{"gitDbRepo":"tenant_configuration.aws-default-pp-mumbai.lsg","gitDbPath":"https://gitea.internal.mum1-pp.zetaapps.in/zetaengg/tenant_configuration.aws-default-pp-mumbai.lsg.git","filePath":"/.defaults/module_configurations/module_aries/tree/root/t0/module_configurations/module_aries/ah-schema/ah-schema-default.yaml","tenantCode":"lsg"}'
spec:
  metadata:
    id: aries.configuration.module.premium.ah-schema
    name: Bank ZEE Premium US AH Schema
    description: Schema enforcing US Reg Z, KYC, and Affluent-tier validation.
    tenantId: '802156'
    tenantCode: zee
  config:
    format: YAML
    schemaUrl: http://localhost
    schemaInlineContent: |
      {"allOf":{"type":"string"},"description":{"type":"string"},"properties":{"type":"string"},"required":{"type":"string"},"sandboxCode":{"type":"string"},"subjectId":{"type":"string"},"title":{"type":"string"},"type":{"type":"string"}}
    key: key
    isEncrypted: false
    useVault: false
    value:
      title: Bank ZEE Ultra-Affluent Root Schema
      type: object

      description: "US Regulatory Schema for Premium Real Account Holders (RAH)"
      # Expanded mandatory fields for affluent compliance
      required: 
        - requestID
        - ifiID
        - type
        - status
        - firstName
        - lastName
        - dob
        - vectors
        - pointsOfPresence
        - financialDetails
        - KYCStatus

      # Logic: If account type is REAL, Vectors (SSN) are mandatory [cite: 32, 54]
      allOf: '[{"if":{"properties":{"type":{"enum":["REAL"]}}},"then":{"properties":{"vectors":{"type":"array","minItems":1,"items":{"required":["type","value","status"],"properties":{"type":{"const":"SSN"},"value":{"type":"string","pattern":"^\\d{9}$","description":"Mandatory 9-digit US Tax ID"},"status":{"const":"ENABLED"}}}}}}}]'

      properties: |
        {
          "firstName": {"type": "string", "pattern": "^[a-zA-Z- ]*$", "maxLength": 25},
          "lastName": {"type": "string", "pattern": "^[a-zA-Z- ]*$", "maxLength": 25},
          "dob": {
            "type": "string",
            "format": "date",
            "description": "Required for age verification per US Card Act [cite: 171]"
          },
          "status": {"enum": ["ENABLED", "DISABLED", "BLOCKED"]},
          "KYCStatus": {
            "type": "object",
            "required": ["kycStatus"],
            "properties": {
              "kycStatus": {"enum": ["Full_KYC", "Min_KYC"], "description": "Premium cards require at least Min_KYC "}
            }
          },
          "pointsOfPresence": {
            "type": "array",
            "items": {
              "type": "object",
              "required": ["label", "addresses"],
              "properties": {
                "label": {"enum": ["Billing", "Permanent", "Work", "Mobile", "Communication"]},
                "addresses": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "required": ["type", "value"],
                    "properties": {
                      "type": {"enum": ["Postal", "Phone", "Email"]},
                      "value": {
                        "properties": {
                          "state": {
                            "pattern": "(?i)^(AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY|DC)$",
                            "description": "Standard US State Abbreviations [cite: 119]"
                          },
                          "country": {"const": "US"},
                          "postCode": {"type": "string", "pattern": "^[0-9]{5}([0-9]{4})?$", "description": "US Zip or Zip+4"}
                        }
                      }
                    }
                  }
                }
              }
            }
          },
          "financialDetails": {
            "type": "object",
            "required": ["incomeDetailsList"],
            "properties": {
              "incomeDetailsList": {
                "type": "array",
                "minItems": 1,
                "items": {
                  "required": ["currency", "value"],
                  "properties": {
                    "currency": {"const": "USD"},
                    "value": {"type": "integer", "minimum": 100000, "description": "Minimum $100k annual income for Affluent tier [cite: 202]"}
                  }
                }
              }
            }
          },
          "tags": {
            "type": "array",
            "items": {
              "required": ["type", "value"],
              "properties": {
                "type": {"enum": ["VIP", "SCRA", "BANKRUPTCY", "ISSUER_INSIDER"], "description": "Regulatory and Status tags [cite: 37, 228]"},
                "value": {"type": "string"}
              }
            }
          }
        }
      sandboxCode: BZ_US_PREMIUM_SB
      subjectId: ACCOUNT_HOLDER
  viewConfig:
    angelosSchema:
      view:
        entityId: angelos.aries.ah-schema
    displayName: Bank ZEE Premium AH Schema
